<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
	<head>
		<div th:replace="cabecalho :: head"></div>
		
		<title>Crud Manager - Usuários</title>
	</head>
	<body>
		<div class="container my-2">
			<h1>Usuários</h1>
			<div>				
				<a class="btn btn-primary btn-sm mb-3 float-right"
				   th:href="@{/users/form}">
		   			Adicionar Usuário
        		</a>
			</div>
			<table class="table table-striped table-responsive-md">
				<thead>
					<tr>
						<th>Nome</th>
						<th>Email</th>
						<th>Gênero</th>
						<th>Endereço</th>
						<th>Ações</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="user : ${usuarios}">
						<td th:text="${user.name}"></td>
						<td th:text="${user.email}"></td>
						<td th:text="${user.gender}"></td>
						<td th:text="${user.address.place + ', nº: ' + user.address.number + ', CEP: ' + user.address.zipCode}"></td>
						<td>
							<a class="btn btn-primary"
							   th:href="@{/users/{id}(id=${user.id})}">
								Alterar
							</a>
							
							<a class="btn btn-danger"
							   th:href="@{/users/delete/{id}(id=${user.id})}">
								Excluir
							</a>			
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</body>
</html>
