<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="cabecalho :: head"></div>
    <title>Crud Manager - Usuários</title>
</head>
<body>
    <div th:replace="cabecalho :: navbar"></div>
    <div class="container my-2">
        <a th:href="@{/}" class="btn btn-secondary btn-sm mb-3">Início</a>
        <h1>Usuários</h1>
        <a class="btn btn-primary btn-sm mb-3 float-right" th:href="@{/users/form}">Adicionar Usuário</a>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Telefone</th>
					<th>Gênero</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${usuarios}">
                    <td th:text="${user.name}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.telefone}"></td>
                    <td th:text="${user.gender}"></td>
                    <td>
                        <a class="btn btn-primary btn-sm" th:href="@{/users/{id}(id=${user.id})}">Alterar</a>
                        <a class="btn btn-danger btn-sm" th:href="@{/users/delete/{id}(id=${user.id})}">Excluir</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
