<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="cabecalho :: head"></div>
    <title>Crud Manager - Usuário</title>
</head>
<body> 
    <div class="container my-2">
        <h2>Usuário</h2>
        <form th:action="@{/users/save}" method="POST" th:object="${user}">
            <input type="hidden" th:field="*{id}">

            <span class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
            <input type="text" placeholder="Nome" class="form-control mb-3 col-4" th:field="*{name}">

            <span class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
            <input type="text" placeholder="Email" class="form-control mb-3 col-4" th:field="*{email}">
            
            <span class="text-danger" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></span>
			<input type="text" placeholder="Gênero (M/F)" class="form-control mb-3 col-4" th:field="*{gender}">

            <span class="text-danger" th:if="${#fields.hasErrors('telefone')}" th:errors="*{telefone}"></span>
            <input type="text" placeholder="Telefone" class="form-control mb-3 col-4" th:field="*{telefone}">

			<span class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
			<input type="password" placeholder="Senha" class="form-control mb-3 col-4" th:field="*{password}">

            <button type="submit" class="btn btn-info col-2">Salvar</button>
        </form>
        <hr>
		<div class="mt-4">
		    <a th:href="@{/users}" class="btn btn-outline-secondary">Voltar</a>
		</div>    
	</div>
</body>
</html>
