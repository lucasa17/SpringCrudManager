<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <div th:replace="cabecalho :: head"></div>
    <title>Cinema - Início</title>
</head>
<body>
    <div class="container my-5">
        <div class="text-center mb-5">
            <h1 class="display-4">Cinema</h1>
            <p class="lead text-muted">Gerencie usuários, filmes e ingressos do sistema.</p>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-3 mb-4">
                <div class="card text-center shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Usuários</h5>
                        <p class="card-text text-muted">Cadastrar, editar e excluir usuários.</p>
                        <a th:href="@{/users}" class="btn btn-primary">Acessar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-center shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Filmes</h5>
                        <p class="card-text text-muted">Gerenciar o catálogo de filmes.</p>
                        <a th:href="@{/movies}" class="btn btn-primary">Acessar</a>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-4">
                <div class="card text-center shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">Ingressos</h5>
                        <p class="card-text text-muted">Registrar e consultar ingressos.</p>
                        <a th:href="@{/tickets}" class="btn btn-primary">Acessar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
